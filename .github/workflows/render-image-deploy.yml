name: Build and Deploy (Render Image)

on:
  push:
    branches:
      - master
      - develop

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build jar
        run: ./mvnw -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/simbakm/recruitify"
          docker buildx build --platform linux/amd64 -t "$IMAGE_NAME:${GITHUB_SHA}" -t "$IMAGE_NAME:latest" --push .
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"

      - name: Trigger Render deploy hook
        shell: bash
        env:
          RENDER_DEPLOY_HOOK_URL_PROD: ${{ secrets.RENDER_DEPLOY_HOOK_URL_PROD }}
          RENDER_DEPLOY_HOOK_URL_STAGING: ${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "master" ]; then
            RENDER_DEPLOY_HOOK_URL="$RENDER_DEPLOY_HOOK_URL_PROD"
          elif [ "$BRANCH" = "develop" ]; then
            RENDER_DEPLOY_HOOK_URL="$RENDER_DEPLOY_HOOK_URL_STAGING"
          else
            echo "No deploy hook configured for branch: $BRANCH"
            exit 0
          fi

          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Deploy hook URL is not set for branch: $BRANCH"
            exit 1
          fi
          export IMAGE_URL="${IMAGE_NAME}:${GITHUB_SHA}"
          ENCODED_IMAGE_URL=$(python -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['IMAGE_URL'], safe=''))")
          if [[ "$RENDER_DEPLOY_HOOK_URL" == *"?"* ]]; then
            HOOK_URL="${RENDER_DEPLOY_HOOK_URL}&imgURL=${ENCODED_IMAGE_URL}"
          else
            HOOK_URL="${RENDER_DEPLOY_HOOK_URL}?imgURL=${ENCODED_IMAGE_URL}"
          fi
          curl -fsS "$HOOK_URL"
