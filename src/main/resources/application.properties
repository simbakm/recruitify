# Enable automatic schema initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Email Configuration
spring.mail.host=live.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=api
spring.mail.password=c212b6a652b5523cd90c6b7fed427bd1
spring.mail.from=hello@demomailtrap.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application scoring and vacancy closing
app.application.scoring.threshold=0.5
app.vacancy.closing.check-delay-ms=60000


# API documentation paths
