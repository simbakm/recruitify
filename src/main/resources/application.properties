spring.application.name=recruitify


spring.r2dbc.url=${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/recruitify_db}
spring.r2dbc.username=${SPRING_R2DBC_USERNAME:postgres}
spring.r2dbc.password=${SPRING_R2DBC_PASSWORD:postgres}
# Enable automatic schema initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql



# Email Configuration
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=c66ea797aad9ee
spring.mail.password=937d146d9172fa
spring.mail.from=hello@demomailtrap.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application scoring and vacancy closing
app.application.scoring.threshold=0.5
app.vacancy.closing.check-delay-ms=60000


# API documentation paths
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# CV parsing microservice
app.python.microservice.url=${APP_PYTHON_MICROSERVICE_URL:http://localhost:5000/parse}
