status = warn

name = PropertiesConfig

# Root logger
rootLogger.level = info
rootLogger.appenderRefs = file
rootLogger.appenderRef.file.ref = DailyFile

# Rolling file appender
appender.DailyFile.type = RollingFile
appender.DailyFile.name = DailyFile
appender.DailyFile.fileName = logs/recruitify.log
appender.DailyFile.filePattern = logs/recruitify_%d{yyyy-MM-dd}.log.gz

appender.DailyFile.layout.type = PatternLayout
appender.DailyFile.layout.pattern = %d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5p %pid --- [%t] %c{1.} : %m%n

appender.DailyFile.policies.type = Policies
appender.DailyFile.policies.time.type = TimeBasedTriggeringPolicy
appender.DailyFile.policies.time.interval = 1
appender.DailyFile.policies.time.modulate = true

appender.DailyFile.strategy.type = DefaultRolloverStrategy
appender.DailyFile.strategy.max = 30